<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#09090f"/>
  <!-- outer ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#ff2d78" stroke-width="8" opacity="0.25"/>
  <circle cx="256" cy="256" r="140" fill="none" stroke="#00f5ff" stroke-width="3" opacity="0.2" stroke-dasharray="12 8"/>
  <!-- compass arms -->
  <line x1="256" y1="80"  x2="256" y2="432" stroke="#2a2a44" stroke-width="4"/>
  <line x1="80"  y1="256" x2="432" y2="256" stroke="#2a2a44" stroke-width="4"/>
  <!-- north pointer - pink/neon -->
  <polygon points="256,88 244,230 256,248 268,230" fill="#ff2d78" opacity="0.9"/>
  <!-- south pointer - dim -->
  <polygon points="256,424 244,282 256,264 268,282" fill="#3a2050" opacity="0.8"/>
  <!-- east pointer - dim -->
  <polygon points="424,256 282,244 264,256 282,268" fill="#1a2a3a" opacity="0.7"/>
  <!-- west pointer - dim -->
  <polygon points="88,256 230,244 248,256 230,268"  fill="#1a2a3a" opacity="0.7"/>
  <!-- center dot -->
  <circle cx="256" cy="256" r="14" fill="#09090f"/>
  <circle cx="256" cy="256" r="10" fill="#00f5ff" opacity="0.9"/>
  <circle cx="256" cy="256" r="5"  fill="#fff" opacity="0.8"/>
  <!-- glow dots -->
  <circle cx="256" cy="256" r="28" fill="none" stroke="#00f5ff" stroke-width="1" opacity="0.15"/>
</svg>
